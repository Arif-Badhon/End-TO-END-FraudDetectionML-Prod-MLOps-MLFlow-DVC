stages:
  merge_data:
    cmd: uv run python scripts/merge_data.py
    deps:
      - scripts/merge_data.py
      - params.yaml
      - data/raw/aaer_mark5.csv
      - data/raw/firm_years_labels.json
    outs:
      - data/interim/firm_years_labeled.parquet

  validate_data:
    cmd: uv run python scripts/validate_data_ge.py
    deps:
      - scripts/validate_data_ge.py
      - params.yaml
      - data/interim/firm_years_labeled.parquet
    outs:
      - reports/gx_validation_report.json

  extract_features:
    cmd: uv run python scripts/extract_features.py
    deps:
      - scripts/extract_features.py
      - params.yaml
      - data/interim/firm_years_labeled.parquet
    outs:
      - data/processed/text_features.parquet

  monitor_features:
    cmd: uv run python scripts/monitor_features.py
    deps:
      - scripts/monitor_features.py
      - params.yaml
      - data/processed/text_features.parquet
    outs:
      - reports/features_profile.html
